<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CronPulse — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0d12;
      --surface:   #111520;
      --surface2:  #181d2a;
      --border:    #1e2435;
      --border2:   #252d42;
      --accent:    #3b82f6;
      --accent2:   #6366f1;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --text:      #e2e8f0;
      --text2:     #8b9ab5;
      --text3:     #4a5568;
      --radius:    12px;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Sora', sans-serif;
    }

    html { font-size: 14px; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

    /* ── Topbar ────────────────────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 60px;
      background: rgba(11,13,18,.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.2rem; font-weight: 800;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 15px rgba(59,130,246,0.4);
    }
    .logo span { color: var(--accent); }

    .health-badge {
      display: flex; align-items: center; gap: 8px;
      font-size: .75rem; font-family: var(--font-mono);
      color: var(--green); background: rgba(34,197,94,.1);
      padding: 6px 12px; border-radius: 30px;
      border: 1px solid rgba(34,197,94,.2);
    }
    .health-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    .page { display: grid; grid-template-columns: 320px 1fr; gap: 0; min-height: calc(100vh - 60px); }

    /* ── Sidebar ───────────────────────────────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 24px;
      background: rgba(17,21,32,0.5);
    }

    /* ── Components ────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .card-title {
      font-size: .8rem; font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; color: var(--text2);
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }

    .form-field { margin-bottom: 16px; }
    label { display: block; font-size: .75rem; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    input, select {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text);
      padding: 10px 14px; outline: none; transition: all 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }

    .interval-row { display: flex; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-sans); font-weight: 600; font-size: .85rem;
      border: none; border-radius: 8px; cursor: pointer;
      padding: 10px 16px; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }

    /* ── Stats ─────────────────────────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-item { background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; }
    .stat-value { font-size: 1.8rem; font-weight: 800; font-family: var(--font-mono); color: var(--text); }
    .stat-label { font-size: .65rem; color: var(--text2); text-transform: uppercase; margin-top: 4px; }

    /* ── Main content ──────────────────────────────────────────────────────── */
    .main-content { display: flex; flex-direction: column; background: var(--bg); }
    .tab-bar {
      display: flex; align-items: center; gap: 4px; padding: 20px 30px 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 12px 20px; font-size: .9rem; font-weight: 600; color: var(--text2);
      background: transparent; border: none; cursor: pointer; border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-count { background: var(--surface2); padding: 2px 8px; border-radius: 10px; font-size: .7rem; margin-left: 6px; }

    .tab-panel { display: none; padding: 30px; flex: 1; overflow-y: auto; }
    .tab-panel.active { display: block; }

    /* ── Tables & Lists ────────────────────────────────────────────────────── */
    .table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; background: var(--surface); }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    thead th { padding: 14px 20px; text-align: left; font-size: .75rem; color: var(--text2); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    td { padding: 16px 20px; vertical-align: middle; }

    .job-name { font-weight: 700; font-size: .95rem; color: var(--text); }
    .job-url { font-family: var(--font-mono); font-size: .8rem; color: var(--accent); display: block; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: .7rem; font-weight: 700; font-family: var(--font-mono); }
    .badge-blue { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid rgba(59,130,246,0.2); }
    .badge-green { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .badge-red { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    .log-entry { display: flex; gap: 15px; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; }
    .log-ts { font-family: var(--font-mono); font-size: .8rem; color: var(--text3); min-width: 150px; }
    .log-url { font-family: var(--font-mono); font-size: .8rem; color: var(--text2); flex: 1; word-break: break-all; }

    /* ── Overlays ──────────────────────────────────────────────────────────── */
    .modal-overlay, .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000;
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
      opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .modal-overlay.open, .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: #111520; border: 1px solid var(--border2); border-radius: 16px; padding: 32px; width: 90%; max-width: 500px; box-shadow: 0 0 100px rgba(0,0,0,0.8); }

    .drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: 100%; max-width: 550px;
      background: var(--surface); border-left: 1px solid var(--border2);
      transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column;
    }
    .drawer-overlay.open .drawer { transform: translateX(0); }
    .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

    #toastContainer { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 14px 24px; border-radius: 10px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; min-width: 250px; animation: slideIn 0.3s forwards; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-success { background: var(--green); color: #fff; }
    .toast-error { background: var(--red); color: #fff; }

    .empty-state { padding: 80px 20px; text-align: center; color: var(--text3); }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 800px) {
      .page { display: block; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
      .topbar { padding: 0 16px; }
      .tab-bar { padding: 10px 16px 0; overflow-x: auto; }
      th:nth-child(2), td:nth-child(2), th:nth-child(4), td:nth-child(4) { display: none; }
      .log-entry { flex-direction: column; align-items: flex-start; gap: 5px; }
      .log-ts { min-width: 0; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Cron<span>Pulse</span>
  </div>
  <div class="health-badge">
    <div class="health-dot"></div>
    <span id="healthStatus">Connecting...</span>
  </div>
</header>

<div class="page">
  <aside class="sidebar">
    <div class="card">
      <div class="card-title">Create Job</div>
      <div class="form-field"><label>Job Name</label><input type="text" id="jobName" placeholder="e.g. Keep Alive" /></div>
      <div class="form-field"><label>Target URL</label><input type="url" id="jobUrl" placeholder="https://..." /></div>
      <div class="form-field">
        <label>Interval</label>
        <div class="interval-row">
          <input type="number" id="jobInterval" value="5" />
          <select id="jobIntervalUnit">
            <option value="minutes">Minutes</option>
            <option value="seconds">Seconds</option>
            <option value="hours">Hours</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="createJob()">Schedule Now</button>
    </div>

    <div class="card">
      <div class="card-title">System Status</div>
      <div class="stats-grid">
        <div class="stat-item"><div class="stat-value" id="statActive">0</div><div class="stat-label">Active Jobs</div></div>
        <div class="stat-item"><div class="stat-value" id="statLogs">0</div><div class="stat-label">Total Logs</div></div>
        <div class="stat-item" style="grid-column: span 2"><div class="stat-value" id="statSuccess" style="color:var(--green)">0%</div><div class="stat-label">Global Success Rate</div></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('jobs', this)">Managed Jobs <span class="tab-count" id="tabJobCount">0</span></button>
      <button class="tab-btn" onclick="switchTab('logs', this)">Execution Logs <span class="tab-count" id="tabLogCount">0</span></button>
      <button class="btn btn-ghost" onclick="refreshAll()" style="margin-left:auto; padding: 6px 12px; font-size: 0.75rem;">Refresh</button>
    </div>

    <div id="tab-jobs" class="tab-panel active">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Target URL</th>
              <th>Interval</th>
              <th>Next Ping</th>
              <th style="text-align:right">Action</th>
            </tr>
          </thead>
          <tbody id="jobsTable">
            <tr><td colspan="5"><div class="empty-state">Loading jobs...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="tab-logs" class="tab-panel">
      <div class="logs-container" id="logsContainer">
        <div class="empty-state">Loading logs...</div>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Edit -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 style="margin-bottom:20px">Edit Cron Job</h3>
    <input type="hidden" id="editJobId" />
    <div class="form-field"><label>Job Name</label><input type="text" id="editName" /></div>
    <div class="form-field"><label>Target URL</label><input type="url" id="editUrl" /></div>
    <div class="form-field">
      <label>Interval</label>
      <div class="interval-row">
        <input type="number" id="editInterval" />
        <select id="editIntervalUnit">
          <option value="seconds">Seconds</option>
          <option value="minutes">Minutes</option>
          <option value="hours">Hours</option>
        </select>
      </div>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:24px;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()" style="width:auto">Save Changes</button>
    </div>
  </div>
</div>

<!-- Drawer: Job Logs -->
<div class="drawer-overlay" id="logsDrawer">
  <div class="drawer">
    <div class="drawer-header">
      <div>
        <h3 id="drawerTitle">Job Logs</h3>
        <small id="drawerSubtitle" style="color:var(--text3)"></small>
      </div>
      <button class="btn btn-ghost" onclick="closeDrawer()" style="padding:4px 8px">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody" style="padding:20px; overflow-y:auto; flex:1;"></div>
    <div style="padding:20px; border-top:1px solid var(--border); text-align:right">
        <button class="btn btn-danger" id="btnClearLogs">Clear All Logs</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script>
// ── Core API ───────────────────────────────────────────────────────────────
async function apiCall(url, options = {}) {
  try {
    const r = await fetch(url, options);
    const contentType = r.headers.get("content-type");
    const data = (contentType && contentType.includes("application/json")) ? await r.json() : null;
    if (!r.ok) throw new Error(data?.detail || `Server error: ${r.status}`);
    return data;
  } catch (e) {
    console.error(`API Error: ${url}`, e);
    throw e;
  }
}

// ── State ──────────────────────────────────────────────────────────────────
let jobsMap = {};
let allLogs = [];

// ── UI Helpers ─────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer'); if (!c) return;
  const e = document.createElement('div');
  e.className = `toast toast-${type}`;
  e.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${msg}</span>`;
  c.appendChild(e);
  setTimeout(() => { e.style.opacity = '0'; setTimeout(() => e.remove(), 300); }, 3000);
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtRelTime(iso) {
  if (!iso) return '—';
  const diff = new Date(iso) - Date.now();
  const abs = Math.abs(diff);
  if (abs < 60000) return diff < 0 ? 'just now' : `${Math.round(abs/1000)}s`;
  if (abs < 3600000) return `${diff < 0 ? '' : 'in '}${Math.round(abs/60000)}m`;
  return new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function fromSeconds(s) {
  if (s % 3600 === 0) return { val: s/3600, unit: 'hours' };
  if (s % 60 === 0) return { val: s/60, unit: 'minutes' };
  return { val: s, unit: 'seconds' };
}

function toSeconds(v, u) {
  v = parseInt(v);
  if (u === 'minutes') return v * 60;
  if (u === 'hours') return v * 3600;
  return v;
}

// ── App Logic ──────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const d = await apiCall('/health');
    const el = document.getElementById('healthStatus');
    if (el) el.textContent = `Online · ${d.jobs} active`;
  } catch {
    const el = document.getElementById('healthStatus');
    if (el) el.textContent = 'Offline';
  }
}

async function fetchJobs() {
  try {
    const jobs = await apiCall('/api/jobs') || [];
    jobsMap = {};
    jobs.forEach(j => jobsMap[j.id] = j);

    const sA = document.getElementById('statActive'); if(sA) sA.textContent = jobs.length;
    const tC = document.getElementById('tabJobCount'); if(tC) tC.textContent = jobs.length;

    const tbody = document.getElementById('jobsTable');
    if (!tbody) return;

    if (!jobs.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">No cron jobs found. Create your first one!</div></td></tr>';
      return;
    }

    tbody.innerHTML = jobs.map(j => `
      <tr>
        <td><div class="job-name">${escHtml(j.name || 'Untitled')}</div></td>
        <td><a href="${escHtml(j.url)}" target="_blank" class="job-url">${escHtml(j.url)}</a></td>
        <td><span class="badge badge-blue">${j.interval_seconds}s</span></td>
        <td><span class="next-run" data-ts="${j.next_run || ''}" style="font-family:var(--font-mono); font-size:0.8rem">${fmtRelTime(j.next_run)}</span></td>
        <td style="text-align:right">
          <div style="display:flex; gap:6px; justify-content:flex-end">
            <button class="btn btn-ghost btn-sm" style="padding:4px 8px" onclick="openJobLogs('${j.id}','${escHtml(j.name)}')">Logs</button>
            <button class="btn btn-ghost btn-sm" style="padding:4px 8px" onclick="openEdit('${j.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" style="padding:4px 8px" onclick="deleteJob('${j.id}')">✕</button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    toast("Failed to update jobs list", "error");
  }
}

async function fetchLogs() {
  try {
    allLogs = await apiCall('/api/logs?limit=100') || [];
    const sL = document.getElementById('statLogs'); if(sL) sL.textContent = allLogs.length;
    const tL = document.getElementById('tabLogCount'); if(tL) tL.textContent = allLogs.length;

    const successes = allLogs.filter(l => l.success).length;
    const rate = allLogs.length ? Math.round((successes/allLogs.length)*100) : 0;
    const sS = document.getElementById('statSuccess'); if(sS) sS.textContent = `${rate}%`;

    const container = document.getElementById('logsContainer');
    if (!container) return;
    if (!allLogs.length) { container.innerHTML = '<div class="empty-state">No execution logs yet.</div>'; return; }

    container.innerHTML = allLogs.map(l => `
      <div class="log-entry">
        <span class="log-ts">${new Date(l.timestamp).toLocaleString()}</span>
        <span class="badge ${l.success ? 'badge-green' : 'badge-red'}" style="min-width:60px; text-align:center">${l.status || 'ERR'}</span>
        <span class="log-url">${escHtml(l.url)}</span>
        ${l.error ? `<small style="color:var(--red); width:100%; margin-left:165px">⚠ ${escHtml(l.error)}</small>` : ''}
      </div>
    `).join('');
  } catch (e) {}
}

async function createJob() {
  const name = document.getElementById('jobName').value.trim();
  const url = document.getElementById('jobUrl').value.trim();
  const val = document.getElementById('jobInterval').value;
  const unit = document.getElementById('jobIntervalUnit').value;

  if (!name || !url) return toast("Name and URL are required", "error");

  try {
    await apiCall('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, url, interval_seconds: toSeconds(val, unit) })
    });
    toast("Job scheduled successfully");
    document.getElementById('jobName').value = "";
    document.getElementById('jobUrl').value = "";
    await fetchJobs();
  } catch (e) {
    toast(e.message, "error");
  }
}

async function deleteJob(id) {
  if (!confirm("Are you sure you want to delete this job and all its logs?")) return;
  try {
    await apiCall(`/api/jobs/${id}`, { method: 'DELETE' });
    toast("Job deleted");
    await fetchJobs();
    await fetchLogs();
  } catch (e) {
    toast("Deletion failed", "error");
  }
}

function openEdit(id) {
  const j = jobsMap[id]; if (!j) return;
  document.getElementById('editJobId').value = id;
  document.getElementById('editName').value = j.name || '';
  document.getElementById('editUrl').value = j.url;
  const { val, unit } = fromSeconds(j.interval_seconds);
  document.getElementById('editInterval').value = val;
  document.getElementById('editIntervalUnit').value = unit;
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); }

async function saveEdit() {
  const id = document.getElementById('editJobId').value;
  const name = document.getElementById('editName').value.trim();
  const url = document.getElementById('editUrl').value.trim();
  const val = document.getElementById('editInterval').value;
  const unit = document.getElementById('editIntervalUnit').value;

  try {
    await apiCall(`/api/jobs/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, url, interval_seconds: toSeconds(val, unit) })
    });
    toast("Job updated");
    closeModal();
    await fetchJobs();
  } catch (e) {
    toast("Update failed", "error");
  }
}

async function openJobLogs(id, name) {
  const drawer = document.getElementById('logsDrawer');
  const body = document.getElementById('drawerBody');
  const title = document.getElementById('drawerTitle');
  const subtitle = document.getElementById('drawerSubtitle');
  const clearBtn = document.getElementById('btnClearLogs');

  title.textContent = name || 'Job Logs';
  subtitle.textContent = `ID: ${id}`;
  body.innerHTML = '<div class="empty-state">Loading history...</div>';
  drawer.classList.add('open');

  clearBtn.onclick = async () => {
      if(!confirm("Clear all history for this job?")) return;
      try {
          await apiCall(`/api/jobs/${id}/logs`, { method: 'DELETE' });
          toast("Logs cleared");
          openJobLogs(id, name);
          fetchLogs();
      } catch { toast("Failed to clear logs", "error"); }
  };

  try {
    const logs = await apiCall(`/api/jobs/${id}/logs?limit=50`) || [];
    if (!logs.length) { body.innerHTML = '<div class="empty-state">No logs found for this job.</div>'; return; }
    body.innerHTML = logs.map(l => `
      <div style="padding:12px; border-bottom:1px solid var(--border2); font-size:0.85rem">
        <div style="display:flex; justify-content:space-between; margin-bottom:4px">
          <span style="color:var(--text3); font-family:var(--font-mono)">${new Date(l.timestamp).toLocaleString()}</span>
          <b style="color:${l.success ? 'var(--green)' : 'var(--red)'}">${l.status}</b>
        </div>
        ${l.error ? `<div style="color:var(--red); font-size:0.75rem">⚠ ${escHtml(l.error)}</div>` : '<div style="color:var(--text3); font-size:0.75rem">Success</div>'}
      </div>
    `).join('');
  } catch {
    body.innerHTML = '<div class="empty-state" style="color:var(--red)">Failed to load logs.</div>';
  }
}
function closeDrawer() { document.getElementById('logsDrawer').classList.remove('open'); }

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  btn.classList.add('active');
  if (tab === 'logs') fetchLogs();
}

async function refreshAll() {
  await Promise.all([checkHealth(), fetchJobs(), fetchLogs()]);
}

// ── Initialization ─────────────────────────────────────────────────────────
setInterval(() => {
  document.querySelectorAll('.next-run').forEach(el => {
    const ts = el.getAttribute('data-ts');
    if (ts) el.textContent = fmtRelTime(ts);
  });
}, 1000);

// Polling
setInterval(fetchJobs, 10000);
setInterval(fetchLogs, 15000);
setInterval(checkHealth, 30000);

// Initial Load
document.addEventListener('DOMContentLoaded', () => {
    checkHealth();
    fetchJobs();
    fetchLogs();
});

// Close overlays on escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeDrawer(); }
});
</script>

</body>
</html>
