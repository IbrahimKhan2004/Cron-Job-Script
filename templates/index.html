<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CronMaster - Professional Cron Job Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-base-200 min-h-screen">
    <div class="navbar bg-base-100 shadow-lg px-4 sm:px-8">
        <div class="flex-1">
            <a class="btn btn-ghost normal-case text-xl font-bold text-primary">
                <i class="fas fa-stopwatch mr-2"></i> CronMaster
            </a>
        </div>
        <div class="flex-none gap-2">
            <div class="dropdown dropdown-end">
                <label class="swap swap-rotate btn btn-ghost btn-circle">
                    <input type="checkbox" class="theme-controller" value="dark" />
                    <svg class="swap-off fill-current w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
                    <svg class="swap-on fill-current w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.69Z"/></svg>
                </label>
            </div>
        </div>
    </div>

    <main class="container mx-auto p-4 sm:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="card bg-base-100 shadow-xl">
                    <div class="card-body">
                        <h2 class="card-title text-primary"><i class="fas fa-plus-circle"></i> Create New Cron</h2>
                        <form id="jobForm" class="space-y-4 mt-4">
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Target URL</span></label>
                                <input type="url" id="url" placeholder="https://api.example.com/ping" class="input input-bordered w-full" required />
                            </div>
                            <div class="form-control">
                                <label class="label"><span class="label-text font-semibold">Interval (Minutes)</span></label>
                                <input type="number" id="interval" placeholder="5" min="1" class="input input-bordered w-full" required />
                            </div>
                            <button type="submit" class="btn btn-primary w-full mt-2">
                                <i class="fas fa-paper-plane mr-2"></i> Schedule Job
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card bg-base-100 shadow-xl mt-8">
                    <div class="card-body">
                        <h2 class="card-title text-secondary"><i class="fas fa-info-circle"></i> System Status</h2>
                        <div class="stats stats-vertical shadow mt-4">
                            <div class="stat">
                                <div class="stat-title">Active Jobs</div>
                                <div class="stat-value text-primary" id="activeJobsCount">0</div>
                            </div>
                            <div class="stat">
                                <div class="stat-title">Legacy Tasks</div>
                                <div class="stat-value text-secondary">21</div>
                                <div class="stat-desc">Hardcoded URLs</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="card bg-base-100 shadow-xl">
                    <div class="card-body">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="card-title text-xl font-bold"><i class="fas fa-list"></i> Managed Cron Jobs</h2>
                            <button class="btn btn-sm btn-ghost" onclick="fetchJobs()">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="table w-full">
                                <thead>
                                    <tr>
                                        <th>URL</th>
                                        <th>Interval</th>
                                        <th class="text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="jobsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card bg-base-100 shadow-xl mt-8">
                    <div class="card-body">
                        <h2 class="card-title text-xl font-bold mb-4"><i class="fas fa-history"></i> Execution Logs</h2>
                        <div class="overflow-x-auto max-h-96">
                            <table class="table table-zebra w-full table-xs">
                                <thead>
                                    <tr>
                                        <th>Time</th>
                                        <th>URL</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="logsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast toast-end"></div>

    <script>
        const showToast = (message, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        const fetchJobs = async () => {
            try {
                const res = await fetch('/api/jobs');
                const jobs = await res.json();
                const tbody = document.getElementById('jobsTable');
                document.getElementById('activeJobsCount').innerText = jobs.length;
                tbody.innerHTML = jobs.map(job => `
                    <tr>
                        <td><div class="font-bold truncate max-w-xs">${job.url}</div></td>
                        <td><div class="badge badge-ghost">${job.interval} min</div></td>
                        <td class="text-right">
                            <button class="btn btn-error btn-xs" onclick="deleteJob('${job.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showToast('Failed to fetch jobs', 'error');
            }
        };

        const fetchLogs = async () => {
            try {
                const res = await fetch('/api/logs');
                const logs = await res.json();
                const tbody = document.getElementById('logsTable');
                tbody.innerHTML = logs.map(log => `
                    <tr>
                        <td class="text-xs">${new Date(log.timestamp).toLocaleString()}</td>
                        <td class="truncate max-w-xs">${log.url}</td>
                        <td>
                            <div class="badge badge-${log.status === 200 ? 'success' : 'error'} badge-sm font-bold">
                                ${log.status}
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {}
        };

        const deleteJob = async (id) => {
            if (!confirm('Are you sure you want to delete this job?')) return;
            try {
                const res = await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Job deleted successfully');
                    fetchJobs();
                }
            } catch (err) {
                showToast('Failed to delete job', 'error');
            }
        };

        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('url').value;
            const interval = parseInt(document.getElementById('interval').value);

            try {
                const res = await fetch('/api/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, interval })
                });
                if (res.ok) {
                    showToast('Job scheduled successfully');
                    document.getElementById('jobForm').reset();
                    fetchJobs();
                } else {
                    const error = await res.json();
                    showToast(error.detail || 'Failed to create job', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        });

        // Init
        fetchJobs();
        fetchLogs();
        setInterval(fetchJobs, 30000);
        setInterval(fetchLogs, 10000);
    </script>
</body>
</html>
