<!DOCTYPE html>
<html lang="en" x-data="{ darkMode: localStorage.getItem('theme') === 'dark' }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron Master - Professional Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div class="min-h-screen p-4 md:p-8" x-data="cronManager()">
        <header class="max-w-6xl mx-auto flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 dark:text-indigo-400">Cron Master</h1>
            <button @click="darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light')"
                    class="p-2 rounded-lg bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition">
                <template x-if="!darkMode">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </template>
                <template x-if="darkMode">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                    </svg>
                </template>
            </button>
        </header>

        <main class="max-w-6xl mx-auto space-y-8">
            <!-- Add Job Section -->
            <section class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700">
                <h2 class="text-xl font-semibold mb-4">Add New Cron Job</h2>
                <form @submit.prevent="addJob" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" x-model="newJob.name" placeholder="Job Name" required
                           class="bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input type="url" x-model="newJob.url" placeholder="Endpoint URL (https://...)" required
                           class="bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg p-2 md:col-span-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <div class="flex gap-2">
                        <input type="number" x-model="newJob.interval" placeholder="Secs" required min="5"
                               class="bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg p-2 w-24 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition-colors flex-1">
                            Add Job
                        </button>
                    </div>
                </form>
            </section>

            <!-- Jobs List Section -->
            <section class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700">
                            <tr>
                                <th class="px-6 py-4 font-semibold">Name</th>
                                <th class="px-6 py-4 font-semibold">URL</th>
                                <th class="px-6 py-4 font-semibold">Interval (s)</th>
                                <th class="px-6 py-4 font-semibold">Status</th>
                                <th class="px-6 py-4 font-semibold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="job in jobs" :key="job.id">
                                <tr class="border-b border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors">
                                    <td class="px-6 py-4" x-text="job.name"></td>
                                    <td class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400 truncate max-w-xs" x-text="job.url"></td>
                                    <td class="px-6 py-4" x-text="job.interval"></td>
                                    <td class="px-6 py-4">
                                        <span :class="job.status === 'active' ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200' : 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200'"
                                              class="px-2 py-1 rounded-full text-xs font-medium uppercase"
                                              x-text="job.status"></span>
                                    </td>
                                    <td class="px-6 py-4 text-right space-x-2">
                                        <button @click="toggleStatus(job)" class="text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-300">
                                            <span x-text="job.status === 'active' ? 'Pause' : 'Resume'"></span>
                                        </button>
                                        <button @click="deleteJob(job.id)" class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300">Delete</button>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="jobs.length === 0">
                                <td colspan="5" class="px-6 py-12 text-center text-gray-500">No cron jobs configured. Add one above!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        function cronManager() {
            return {
                jobs: [],
                newJob: { name: '', url: '', interval: 60 },
                async init() {
                    await this.fetchJobs();
                },
                async fetchJobs() {
                    try {
                        const res = await fetch('/jobs');
                        this.jobs = await res.json();
                    } catch (e) {
                        console.error('Failed to fetch jobs', e);
                    }
                },
                async addJob() {
                    try {
                        const res = await fetch('/jobs', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.newJob)
                        });
                        if (res.ok) {
                            this.newJob = { name: '', url: '', interval: 60 };
                            await this.fetchJobs();
                        }
                    } catch (e) {
                        console.error('Failed to add job', e);
                    }
                },
                async toggleStatus(job) {
                    const newStatus = job.status === 'active' ? 'paused' : 'active';
                    try {
                        const res = await fetch(`/jobs/${job.id}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ status: newStatus })
                        });
                        if (res.ok) await this.fetchJobs();
                    } catch (e) {
                        console.error('Failed to update job', e);
                    }
                },
                async deleteJob(id) {
                    if (!confirm('Are you sure you want to delete this job?')) return;
                    try {
                        const res = await fetch(`/jobs/${id}`, { method: 'DELETE' });
                        if (res.ok) await this.fetchJobs();
                    } catch (e) {
                        console.error('Failed to delete job', e);
                    }
                }
            }
        }
    </script>
</body>
</html>
